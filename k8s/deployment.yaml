apiVersion: apps/v1
kind: Deployment
metadata:
  name: shine-project
  namespace: shine-app
  labels:
    app.kubernetes.io/name: shine-project
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: shine-gitops-platform
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: shine-project
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shine-project
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: shine-gitops-platform
    spec:
      containers:
        - name: shine-project
          image: angs009/shine-project:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3130
              protocol: TCP
          env:
            - name: PORT
              value: "3130"
            - name: MONGODB_URI
              value: "mongodb://mongodb-deployment:27017/myDatabase"
            - name: SESSION_SECRET
              value: "change-this-session-secret"
            - name: EMAIL_USER
              value: ""
            - name: EMAIL_PASS
              value: ""
          readinessProbe:
            httpGet:
              path: /index
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /index
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

